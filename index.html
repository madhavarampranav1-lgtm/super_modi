<!DOCTYPE html>
<html>
<head>
    <title>Modi</title>
    <style>
       html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        #background {
            
            position:relative;
            width: 100vw;   /* full viewport width */
            height: 100vh;  /* full viewport height */

            background-color: rgb(43, 94, 181);
            
       }
        #modi {
            
            position: absolute;
            top: 40%;
            
            

        }
    @keyframes ani {
            0% { opacity: 1; }
            50% { opacity: 0.25; }
            100% { opacity: 1; }
        }

        #diff{
            position:absolute;
            top:10px;
            left:90vh;
            font-size:20px;
            color:white;
        }
        .epstein{
            position: absolute;
            bottom: 0;
            left: 88vw;
            height: 100vh;
            width: 12vw;
            
        }

        .epstein img{
            height: 100%;
            width: auto;
        }
        .whole{
            top: 0;
            left:30vh;
            height:20px;
            width:150px;
            background-color:white;
            position:absolute;        
        
        }
        .whole1{
            top: 0;
            right:30vh;
            height:20px;
            width:200px;
            background-color:white;
            position:absolute;        
        
        }
        .part{
            height:100%;
            width:0px;
            background-color:green;
            
        }
        .part1{
            height:100%;
            width:200px;
            background-color:green;
            
        }
        .pdf{
            height:120px;
            width:120px;
            
            background-color:orange;
            left:80vw;
            position:absolute;
        }
        .pdf.trump{
            top:20px;
        }
        .pdf.bill_gates{
           top: calc(100vh - 120px);
        }
        .setting{
            position:absolute;
            text-align: center;
            background-color:grey;
            height:200px;
            width:300px;
            left:40vw;
            top:35vh;
            
            box-shadow:  5px 5px 5px rgba(170, 164, 164,0.5);
        }
        button{
            width:200px;
            height:30px;
            font-size:15px;
        }
        .reload{
            position:absolute;
            top:50vh;
            left:90vh;
            display: none;
            z-index: 10;
        }
        .symbol{
            position:absolute;
            top:0px;
            right:0px;
            padding: 0px;
            height:25px;
            width:25px;
            

            font-size:30px;
        }
        .symbol p {
        margin: 0;
        line-height: 25px; /* center vertically */
        text-align: center;
}
        .symbol:hover {
            cursor: pointer;
            background-color: rgb(156, 152, 152);
        }

    </style>

</head>
<body>
    <div id="background">
        <div id="modi"><img src="modipic.png" alt="Modi" width="100px" height="100px" ></div>
        <div><p id="diff"></p></div>
        <div class="epstein"><img src="epstein.png" alt="epstein"></div>
        <div class="whole"><div class="part"></div></div>
        <div class="whole1"><div class="part1"></div></div>
        <div class="pdf trump"><img src="trump.png" alt="Trump" width="120px" height="120px"></div>
        <div class="pdf bill_gates"><img src="billgates.png" alt="Bill Gates" width="120px" height="120px"></div></div>
        <div class="setting"><p style="font-size:20px;"><b>Settings</b></p><p style="font-size:15px;">choose your difficulty</p>
            <div class="symbol"><p>⚙</p></div>
            <button onclick="asetting(30)">Easy</button><br>
            <button onclick="asetting(20)">Medium</button><br>
            <button onclick="asetting(10)">Hard</button>
        </div>
        <div class="reload"><button onclick="location.reload();">&#x21bb; Replay</button></div>
        <audio id="lavde" src="lavdenabhojyam.mp3"></audio>
        <audio id="bgm" src="bgm.mp3"  loop></audio>
        <img src="modiwindance.gif" alt="modi dance" style="position:absolute;top:5px;left:70vh;width:570px;height:722px;display:none;" id="dance">
        <img src="modilose.webp" alt="modi lose" style="position:absolute;top:5px;left:70vh;width:570px;height:722px;display:none;" id="lose">
    <script>
        function showBackground() {
            document.getElementById("background").style.display = "block";
        }
        function hideBackground() {
            document.getElementById("background").style.display = "none";
        }
        function movemodiup(modi,k) {
            
            modi.style.top =parseFloat(window.getComputedStyle(modi).getPropertyValue("top"))- k + "px";
        }
        function movemodidown(modi,k) {
            
            modi.style.top = parseFloat(window.getComputedStyle(modi).getPropertyValue("top")) + k + "px";
        
        }


        function checol(bullet,vil){
            
                if(bullet.offsetLeft>parseFloat(window.getComputedStyle(vil).getPropertyValue("left"))-parseFloat(window.getComputedStyle(bullet).getPropertyValue("width"))&&
                parseFloat(window.getComputedStyle(bullet).getPropertyValue("top"))<parseFloat(window.getComputedStyle(vil).getPropertyValue("top"))+parseFloat(window.getComputedStyle(vil).getPropertyValue("height"))&&
                parseFloat(window.getComputedStyle(bullet).getPropertyValue("top"))>parseFloat(window.getComputedStyle(vil).getPropertyValue("top"))-parseFloat(window.getComputedStyle(bullet).getPropertyValue("height"))&&
                bullet.offsetLeft<parseFloat(window.getComputedStyle(vil).getPropertyValue("left"))+parseFloat(window.getComputedStyle(vil).getPropertyValue("width"))){
                return 1;}
            
                else{
                    return 0;
                }}
        
        

        
       
        function gen_bul() {
            const bullet = document.getElementsByClassName("bullet");
            if(k%2==0){
            
            const div=document.createElement("div");
            var modi = document.getElementById("modi");
            div.className="bullet";
            div.style.position="absolute";

            div.style.backgroundImage = "url('teapic.png')";
            div.style.backgroundSize = "cover";
            div.style.height = "16px";
            div.style.width = "24px";
            div.style.left = "40px";
            document.getElementById("background").appendChild(div);
            

            bullet[bullet.length-1].style.top =
            parseFloat(window.getComputedStyle(modi).getPropertyValue("top")) + 50 + "px";}
            k++;
            for(let j=0;j<bullet.length;j++){


            bullet[j].style.left = (bullet[j].offsetLeft + distance) + "px";}
            for(let j=bullet.length-1; j>=0; j--){

            if(checol(bullet[j],document.getElementsByClassName("epstein")[0])){
                bullet[j].remove();
                
                let x = document.getElementsByClassName("part1")[0];
                let currentWidth = parseFloat(window.getComputedStyle(x).width); // get numeric width
                x.style.width = (currentWidth + 0.1) + "px"; // add 1 pixel
                if (currentWidth >= 200) {
                hideBackground();
                document.getElementById("dance").style.display="block";
                
                clearInterval(id);
                clearInterval(gd);
                clearInterval(kd);
                clearInterval(ad);
                document.getElementsByClassName("reload")[0].style.display="block";
                document.getElementById("bgm").pause();
                
                               }

        
                }    
            if(checol(bullet[j],document.getElementsByClassName("pdf trump")[0])){
                bullet[j].remove();}
            if(checol(bullet[j],document.getElementsByClassName("pdf bill_gates")[0])){
                bullet[j].remove();}}

       
        
        }
        function gen_mis(){
            if(i%freq==0){
            const div=document.createElement("div");
            div.className="missile";
            div.style.position="absolute";
            div.style.width="100px";
            div.style.height="20px";
            div.style.backgroundImage = "url('missile.png')";
            div.style.backgroundSize = "cover";
            document.getElementById("background").appendChild(div);
            div.style.left="88vw";
            div.style.top = Math.floor(Math.random() * (window.innerHeight - 20)) + "px";}
            i++;
            const missile=document.getElementsByClassName("missile");
            for(let j=0;j<missile.length;j++){
                 missile[j].style.left = (missile[j].offsetLeft - 80) + "px";}
            
            for(let j=missile.length-1; j>=0; j--){

            if(checol(missile[j],document.getElementById("modi"))){
                missile[j].remove();
                
                let x = document.getElementsByClassName("part")[0];
                let currentWidth = parseFloat(window.getComputedStyle(x).width); // get numeric width
                x.style.width = (currentWidth + 5) + "px"; 
                modi.style.animation = "none";        // reset
                modi.offsetHeight;                   // force reflow
                document.getElementById("lavde").play();

                document.getElementById("modi").style.animation = "ani 0.25s 2";
                
                
                if (currentWidth >= 150) {
                hideBackground();
                document.getElementById("lose").style.display="block";
                document.getElementById("lavde").play();
                
                clearInterval(gd);
                clearInterval(id);
                clearInterval(kd);
                clearInterval(ad);
                hideBackground();
                document.getElementsByClassName("reload")[0].style.display="block";
                document.getElementById("bgm").pause();
                
            }}continue;// add 1 pixel
            if (parseFloat(window.getComputedStyle(missile[j]).getPropertyValue("left"))<-100) {
                missile[j].remove();            }

        





        }}

         function a(k,a,l){
         
         if(l==0){
            movemodidown(k,a);
         }
         if(l==1){
            movemodiup(k,a);
         }
         if(parseFloat(window.getComputedStyle(k).getPropertyValue("top"))<=20){
            l=0;
         }
         if(parseFloat(window.getComputedStyle(k).getPropertyValue("bottom")) <= 0){
            l=1;
         }
         return l;
        }
        hideBackground();
        
        
        function asetting(kgh){
            
        document.getElementById("bgm").play();

        
        document.getElementsByClassName("setting")[0].style.display="none";
        
        distance=80;
        time=60;
        freq=kgh;
        if(freq==30){
             document.getElementById("diff").innerText = "Easy mode ";
        }
        else if(freq==20){
             document.getElementById("diff").innerText = "Medium mode ";
        }
        else if(freq==10){
            document.getElementById("diff").innerText = "Hard mode ";
        }
        document.addEventListener("keydown", function(event) {
            if (event.key === "ArrowUp"&&parseFloat(window.getComputedStyle(document.getElementById("modi")).getPropertyValue("top"))>20) {
                movemodiup(document.getElementById("modi"), 40);
            } else if (event.key === "ArrowDown"&&parseFloat(window.getComputedStyle(document.getElementById("modi")).getPropertyValue("top"))<window.innerHeight-120) {
                movemodidown(document.getElementById("modi"), 40);
            }
        }); 

        id=setInterval(gen_bul,time);
        k=0;
        i=0;
        y=1;
        b=0;
        gd=setInterval(gen_mis,60);
        kd=setInterval(function(){b=a(document.getElementsByClassName("pdf trump")[0],20,b)},60);
        ad=setInterval(function(){y=a(document.getElementsByClassName("pdf bill_gates")[0],20,y)},60);
        showBackground();
        }




    </script>
 
        
    
</body>
</html>
