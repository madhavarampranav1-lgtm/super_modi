<!DOCTYPE html>
<html>
<head>
    <title>Modi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #background {
            
            position:relative;
            width: 100vw;   /* full viewport width */
            height: 100vh;  /* full viewport height */

            background-color: rgb(43, 94, 181);
            
       }
        #modi {
            
            position: absolute;
            top: 40%;
            
            

        }
        .trump{
            position: absolute;
            bottom: 0;
            left: 88vw;
            height: 100vh;
            width: 12vw;
            overflow: hidden;
        }

        .trump img{
            height: 100%;
            width: auto;
        }
        .whole{
            top: 0;
            left:30vh;
            height:20px;
            width:150px;
            background-color:white;
            position:absolute;        
        
        }
        .whole1{
            top: 0;
            right:30vh;
            height:20px;
            width:200px;
            background-color:white;
            position:absolute;        
        
        }
        .part{
            height:100%;
            width:0px;
            background-color:green;
            
        }
        .part1{
            height:100%;
            width:0px;
            background-color:green;
            
        }

    </style>
    <script>
        var distance=10;
        var time=5;
        function showBackground() {
            document.getElementById("background").style.display = "block";
        }
        function hideBackground() {
            document.getElementById("background").style.display = "none";
        }
        function movemodiup() {
            var modi = document.getElementById("modi");
            modi.style.top =parseFloat(window.getComputedStyle(modi).getPropertyValue("top"))- 10 + "px";
        }
        function movemodidown() {
            var modi = document.getElementById("modi");
            modi.style.top = parseFloat(window.getComputedStyle(modi).getPropertyValue("top")) + 10 + "px";
        
        }
        document.addEventListener("keydown", function(event) {
            if (event.key === "ArrowUp"&&parseFloat(window.getComputedStyle(document.getElementById("modi")).getPropertyValue("top"))>10) {
                movemodiup();
            } else if (event.key === "ArrowDown"&&parseFloat(window.getComputedStyle(document.getElementById("modi")).getPropertyValue("top"))<window.innerHeight-110) {
                movemodidown();
            }
        }); 
        function checol(bullet,vil){
            
                if(parseFloat(window.getComputedStyle(bullet).getPropertyValue("left"))>parseFloat(window.getComputedStyle(vil).getPropertyValue("left"))-parseFloat(window.getComputedStyle(bullet).getPropertyValue("width"))&&
                parseFloat(window.getComputedStyle(bullet).getPropertyValue("top"))<parseFloat(window.getComputedStyle(vil).getPropertyValue("top"))+parseFloat(window.getComputedStyle(vil).getPropertyValue("height"))&&
                parseFloat(window.getComputedStyle(bullet).getPropertyValue("top"))>parseFloat(window.getComputedStyle(vil).getPropertyValue("top"))-parseFloat(window.getComputedStyle(bullet).getPropertyValue("height"))&&
                parseFloat(window.getComputedStyle(bullet).getPropertyValue("left"))<parseFloat(window.getComputedStyle(vil).getPropertyValue("left"))+parseFloat(window.getComputedStyle(vil).getPropertyValue("width"))){
                return 1;}
            
                else{
                    return 0;
                }}

        
        i=0;
        id=setInterval(gen_bul,time);
        function gen_bul() {
            i++;
            const div=document.createElement("div");
            var modi = document.getElementById("modi");
            div.className="bullet";
            div.style.position="absolute";

            div.style.backgroundColor = "brown";
            div.style.height = "2px";
            div.style.width = "6px";
            div.style.left = "80px";
            document.getElementById("background").appendChild(div);
            const bullet = document.getElementsByClassName("bullet");

            bullet[bullet.length-1].style.top =
            parseFloat(window.getComputedStyle(modi).getPropertyValue("top")) + 50 + "px";
            for(let j=0;j<bullet.length;j++){


            bullet[j].style.left = parseFloat(window.getComputedStyle(bullet[j]).getPropertyValue("left")) + distance + "px";}
            for(let j=bullet.length-1; j>=0; j--){

            if(checol(bullet[j],document.getElementsByClassName("trump")[0])){
                bullet[j].remove();
                
                let x = document.getElementsByClassName("part1")[0];
                let currentWidth = parseFloat(window.getComputedStyle(x).width); // get numeric width
                x.style.width = (currentWidth + 0.1) + "px"; // add 1 pixel
                if (currentWidth >= 200) {
                alert("You win!");
                clearInterval(id);

        }

            }}

           
        }
        



    </script>

</head>

        <div class="whole"><div class="part"></div></div>
        <div class="whole1"><div class="part1"></div></div>

</body>
